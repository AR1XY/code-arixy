<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>codarixy — мультишифратор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* чтобы не выделялся угол */
        }

        body {
            background: #d8f3dc;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 650px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background: #f0fbf4;
            border-radius: 42px;
            padding: 28px 22px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid #b7e4c7;
            transition: all 0.2s;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            position: relative;
        }

        /* Секретный угол (левый верхний угол всей карточки) */
        .secret-corner {
            position: absolute;
            top: 0;
            left: 0;
            width: 80px;
            height: 80px;
            cursor: default;
            z-index: 10;
            background: transparent;
        }

        .header h1 {
            font-size: 2rem;
            color: #1b4332;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #2d6a4f;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* select, input, textarea */
        .cipher-select {
            margin-bottom: 20px;
        }

        .cipher-select label {
            display: block;
            color: #1b4332;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 8px;
            margin-left: 6px;
        }

        select, .caesar-slider {
            width: 100%;
            padding: 14px;
            background: white;
            border: 1px solid #b7e4c7;
            border-radius: 28px;
            font-size: 1rem;
            color: #1b4332;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }

        select:focus, textarea:focus {
            border-color: #2d6a4f;
            box-shadow: 0 0 0 2px rgba(45, 106, 79, 0.2);
        }

        .caesar-slider {
            margin-top: 10px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="range"] {
            flex: 2;
            min-width: 150px;
        }

        .shift-value {
            background: #d8f3dc;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: bold;
            color: #1b4332;
        }

        textarea {
            width: 100%;
            padding: 16px;
            background: white;
            border: 1px solid #b7e4c7;
            border-radius: 28px;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            resize: vertical;
            color: #1b4332;
        }

        .buttons {
            display: flex;
            gap: 14px;
            margin: 24px 0 28px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            background: #40916c;
            color: white;
            font-family: inherit;
        }

        button:active {
            transform: scale(0.97);
        }

        .result-section {
            margin-bottom: 24px;
        }

        .result-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            margin-left: 6px;
        }

        .result-label span:first-child {
            font-weight: 600;
            color: #1b4332;
        }

        .result-label span:last-child {
            background: #d8f3dc;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #2d6a4f;
        }

        .result-box {
            background: white;
            border-radius: 28px;
            padding: 16px;
            border-left: 5px solid #52b788;
            word-break: break-all;
            font-family: monospace;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .result-text {
            flex: 1;
            color: #1b4332;
        }

        .copy-btn {
            background: #d8f3dc;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: #1b4332;
            font-weight: bold;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #b7e4c7;
        }

        .footer a {
            color: #2d6a4f;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 500px) {
            .card {
                padding: 20px 16px;
            }
            .result-box {
                flex-direction: column;
                align-items: flex-start;
            }
            .copy-btn {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <!-- секретный угол (левый верх) -->
        <div id="secretCorner" class="secret-corner"></div>

        <div class="header">
            <h1>codarixy 🌿</h1>
            <p>мультишифратор от AR1XY</p>
        </div>

        <div class="cipher-select">
            <label>🔧 Выберите шифр</label>
            <select id="cipherType">
                <option value="base64">Base64</option>
                <option value="rot13">ROT13 (только латиница)</option>
                <option value="atbash">Atbash</option>
                <option value="caesar">Цезарь (со сдвигом)</option>
                <option value="xor">XOR (секретный ключ)</option>
            </select>
            <div id="caesarControl" style="display: none;" class="caesar-slider">
                <span>Сдвиг:</span>
                <input type="range" id="shiftSlider" min="1" max="25" value="3">
                <span id="shiftValue" class="shift-value">3</span>
            </div>
        </div>

        <textarea id="inputText" rows="4" placeholder="Введите текст для шифрования / расшифровки..."></textarea>

        <div class="buttons">
            <button id="encryptBtn">🔒 ЗАШИФРОВАТЬ</button>
            <button id="decryptBtn">🔓 РАСШИФРОВАТЬ</button>
        </div>

        <div class="result-section">
            <div class="result-label">
                <span>✨ Результат</span>
                <span id="actionBadge">—</span>
            </div>
            <div class="result-box">
                <span class="result-text" id="resultText">—</span>
                <button class="copy-btn" id="copyBtn" style="display: none;">📋 Копировать</button>
            </div>
        </div>

        <div class="footer">
            <p>📱 <a href="https://t.me/odwob" target="_blank">@odwob в Telegram</a></p>
        </div>
    </div>
</div>

<script>
    // ---------- СЕКРЕТНЫЙ XOR КЛЮЧ ----------
    const XOR_KEY = "codarixy_secret_key";
    let secretKeyRevealed = false;

    // ---------- СЕКРЕТНЫЙ УГОЛ (10 секунд) ----------
    let pressTimer = null;
    const corner = document.getElementById('secretCorner');
    corner.addEventListener('touchstart', (e) => {
        e.preventDefault();
        pressTimer = setTimeout(() => {
            if (!secretKeyRevealed) {
                secretKeyRevealed = true;
                alert(`🔐 Секретный ключ для XOR:\n\n${XOR_KEY}\n\nИспользуйте его для шифрования и расшифровки.`);
            }
        }, 10000);
    });
    corner.addEventListener('touchend', () => {
        if (pressTimer) clearTimeout(pressTimer);
    });
    corner.addEventListener('mousedown', () => {
        pressTimer = setTimeout(() => {
            if (!secretKeyRevealed) {
                secretKeyRevealed = true;
                alert(`🔐 Секретный ключ для XOR:\n\n${XOR_KEY}\n\nИспользуйте его для шифрования и расшифровки.`);
            }
        }, 10000);
    });
    corner.addEventListener('mouseup', () => {
        if (pressTimer) clearTimeout(pressTimer);
    });

    // ---------- ЛОГИКА ШИФРОВ ----------
    const cipherSelect = document.getElementById('cipherType');
    const caesarControl = document.getElementById('caesarControl');
    const shiftSlider = document.getElementById('shiftSlider');
    const shiftSpan = document.getElementById('shiftValue');

    cipherSelect.addEventListener('change', () => {
        const isCaesar = cipherSelect.value === 'caesar';
        caesarControl.style.display = isCaesar ? 'flex' : 'none';
    });

    shiftSlider.addEventListener('input', () => {
        shiftSpan.innerText = shiftSlider.value;
    });

    // Вспомогательные функции шифров
    function base64Enc(str) { return btoa(unescape(encodeURIComponent(str))); }
    function base64Dec(str) { return decodeURIComponent(escape(atob(str))); }

    function rot13(str) {
        return str.replace(/[a-zA-Z]/g, c => {
            const base = c <= 'Z' ? 65 : 97;
            return String.fromCharCode((c.charCodeAt(0) - base + 13) % 26 + base);
        });
    }

    function atbash(str) {
        return str.replace(/[a-zA-Z]/g, c => {
            const base = c <= 'Z' ? 65 : 97;
            return String.fromCharCode(base + 25 - (c.charCodeAt(0) - base));
        });
    }

    function caesarEnc(str, shift) {
        return str.replace(/[a-zA-Z]/g, c => {
            const base = c <= 'Z' ? 65 : 97;
            return String.fromCharCode((c.charCodeAt(0) - base + shift) % 26 + base);
        });
    }
    function caesarDec(str, shift) { return caesarEnc(str, 26 - shift); }

    // XOR с ключом (работает с любым текстом)
    function xorWithKey(data, key) {
        let result = '';
        for (let i = 0; i < data.length; i++) {
            result += String.fromCharCode(data.charCodeAt(i) ^ key.charCodeAt(i % key.length));
        }
        return result;
    }
    function xorEncrypt(plain, key) {
        return btoa(xorWithKey(plain, key));
    }
    function xorDecrypt(encoded, key) {
        const str = atob(encoded);
        return xorWithKey(str, key);
    }

    function encryptText(text, cipher, shift = 3) {
        switch(cipher) {
            case 'base64': return base64Enc(text);
            case 'rot13': return rot13(text);
            case 'atbash': return atbash(text);
            case 'caesar': return caesarEnc(text, shift);
            case 'xor': return xorEncrypt(text, XOR_KEY);
            default: return text;
        }
    }

    function decryptText(text, cipher, shift = 3) {
        switch(cipher) {
            case 'base64': 
                try { return base64Dec(text); } catch(e) { throw new Error('Неверный Base64'); }
            case 'rot13': return rot13(text);
            case 'atbash': return atbash(text);
            case 'caesar': return caesarDec(text, shift);
            case 'xor':
                try { return xorDecrypt(text, XOR_KEY); } catch(e) { throw new Error('Не удалось расшифровать XOR'); }
            default: return text;
        }
    }

    // UI элементы
    const inputArea = document.getElementById('inputText');
    const resultSpan = document.getElementById('resultText');
    const copyBtn = document.getElementById('copyBtn');
    const actionBadge = document.getElementById('actionBadge');

    function setResult(text, action) {
        resultSpan.innerText = text || "—";
        actionBadge.innerText = action;
        copyBtn.style.display = (text && text !== "—") ? "inline-block" : "none";
    }

    document.getElementById('encryptBtn').onclick = () => {
        const text = inputArea.value.trim();
        if (!text) { setResult("❌ Введите текст", "ошибка"); return; }
        const cipher = cipherSelect.value;
        const shift = parseInt(shiftSlider.value);
        try {
            const encrypted = encryptText(text, cipher, shift);
            setResult(encrypted, `зашифровано (${cipher}) ✅`);
        } catch(e) {
            setResult("Ошибка шифрования", "ошибка");
        }
    };

    document.getElementById('decryptBtn').onclick = () => {
        const data = inputArea.value.trim();
        if (!data) { setResult("❌ Введите строку", "ошибка"); return; }
        const cipher = cipherSelect.value;
        const shift = parseInt(shiftSlider.value);
        try {
            const decrypted = decryptText(data, cipher, shift);
            setResult(decrypted, `расшифровано (${cipher}) ✅`);
        } catch(e) {
            setResult("❌ Расшифровка не удалась", "ошибка");
        }
    };

    copyBtn.onclick = () => {
        navigator.clipboard.writeText(resultSpan.innerText);
        copyBtn.innerText = "✅ Скопировано!";
        setTimeout(() => copyBtn.innerText = "📋 Копировать", 1500);
    };
</script>
</body>
</html>
