<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>codarixy — шифрование</title>
    <style>
        *{box-sizing:border-box}
        body{background:#0b0f1c;font-family:monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:20px}
        .card{background:#12172a;border-radius:42px;padding:2rem;max-width:750px;width:100%;border:1px solid #2a2f44}
        h1{color:#b77cff;text-align:center}
        .sub{text-align:center;color:#8e9aaf;margin-bottom:2rem}
        textarea{width:100%;padding:16px;background:#010409;border:1px solid #2d3348;color:#e5e9f0;border-radius:24px;font-family:monospace;resize:vertical}
        .btn-group{display:flex;gap:15px;margin:25px 0}
        button{flex:1;background:#1f2a48;border:none;padding:12px;border-radius:60px;font-weight:bold;color:white;cursor:pointer}
        button#encryptBtn{background:#3c2e5e;border:1px solid #9166ff}
        button#decryptBtn{background:#1f3a4b;border:1px solid #4f9eff}
        .result-box{background:#06080f;border-radius:24px;padding:16px;word-break:break-all;border-left:4px solid #b77cff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
        .copy-btn{background:#2a2f44;padding:6px 14px;border-radius:30px;cursor:pointer;border:none;color:white}
        .footer{font-size:0.7rem;text-align:center;margin-top:2rem;color:#4b587c}
    </style>
</head>
<body>
<div class="card">
    <h1>codarixy 🔐</h1>
    <div class="sub">XOR + Base64 · шифруй и расшифровывай</div>
    <textarea id="inputArea" rows="4" placeholder="Текст для шифрования или зашифрованная строка..."></textarea>
    <div class="btn-group">
        <button id="encryptBtn">🔒 ЗАШИФРОВАТЬ</button>
        <button id="decryptBtn">🔓 РАСШИФРОВАТЬ</button>
    </div>
    <div class="result-box">
        <span id="resultText">Результат появится здесь</span>
        <button class="copy-btn" id="copyBtn" style="display:none;">📋 Копировать</button>
    </div>
    <div class="footer">⚡ ключ: <strong>codarixy_secret_key</strong></div>
</div>
<script>
const SECRET_KEY="codarixy_secret_key";
function xorWithKey(a,b){let r=new Uint8Array(a.length);for(let i=0;i<a.length;i++)r[i]=a[i]^b[i%b.length];return r;}
function toBase64(b){return btoa(String.fromCharCode(...b));}
function fromBase64(s){let b=atob(s),r=new Uint8Array(b.length);for(let i=0;i<b.length;i++)r[i]=b.charCodeAt(i);return r;}
function encrypt(t){let a=new TextEncoder().encode(t),b=new TextEncoder().encode(SECRET_KEY);return toBase64(xorWithKey(a,b));}
function decrypt(s){let a=fromBase64(s),b=new TextEncoder().encode(SECRET_KEY);return new TextDecoder().decode(xorWithKey(a,b));}
const input=document.getElementById('inputArea'),result=document.getElementById('resultText'),copy=document.getElementById('copyBtn');
function setRes(t){result.innerText=t;copy.style.display=t&&t!="Результат появится здесь"?"inline-block":"none";}
document.getElementById('encryptBtn').onclick=()=>{let t=input.value.trim();if(!t)setRes("Введите текст");else try{setRes(encrypt(t));}catch(e){setRes("Ошибка");}};
document.getElementById('decryptBtn').onclick=()=>{let s=input.value.trim();if(!s)setRes("Введите строку");else try{setRes(decrypt(s));}catch(e){setRes("Ошибка расшифровки");}};
copy.onclick=()=>{navigator.clipboard.writeText(result.innerText);copy.innerText="Скопировано!";setTimeout(()=>copy.innerText="Копировать",1500);};
</script>
</body>
</html>
