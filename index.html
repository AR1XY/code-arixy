<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Coder AR1XY — мультишифратор</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #d8f3dc;
            --card: #f0fbf4;
            --border: #b7e4c7;
            --text: #1b4332;
            --text-secondary: #2d6a4f;
            --input-bg: white;
            --accent: #40916c;
            --accent-light: #52b788;
            --badge-bg: #d8f3dc;
        }
        
        body.dark {
            --bg: #0d1f1a;
            --card: #1a2e25;
            --border: #2d5a4a;
            --text: #e8f5e9;
            --text-secondary: #a5d6a7;
            --input-bg: #0f281f;
            --accent: #2d6a4f;
            --accent-light: #40916c;
            --badge-bg: #1e3a2f;
        }
        
        body {
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s;
        }
        .container { max-width: 650px; width: 100%; margin: 0 auto; }
        .card {
            background: var(--card);
            border-radius: 42px;
            padding: 28px 22px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
            transition: background 0.3s, border 0.3s;
            position: relative;
        }
        .theme-toggle {
            position: absolute;
            top: 20px;
            left: 22px;
            background: var(--badge-bg);
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 40px;
            transition: 0.2s;
            z-index: 20;
        }
        .header { text-align: center; margin-bottom: 24px; margin-top: 8px; }
        .header h1 { 
            color: var(--text); 
            font-size: 2rem; 
            display: inline-block;
            padding: 0 20px;
            cursor: default;
        }
        .header p { color: var(--text-secondary); font-size: 0.85rem; }
        
        .cipher-select { margin-bottom: 20px; }
        .cipher-select label { display: block; color: var(--text); font-weight: 600; margin-bottom: 8px; }
        select, .caesar-slider {
            width: 100%;
            padding: 14px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            font-size: 1rem;
            color: var(--text);
            cursor: pointer;
        }
        .caesar-slider {
            margin-top: 10px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        input[type="range"] { flex: 2; min-width: 150px; cursor: pointer; }
        .shift-value { background: var(--badge-bg); padding: 6px 14px; border-radius: 40px; font-weight: bold; color: var(--text); }
        textarea {
            width: 100%;
            padding: 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            font-family: monospace;
            font-size: 0.95rem;
            resize: vertical;
            color: var(--text);
        }
        .buttons { display: flex; gap: 14px; margin: 24px 0 28px; flex-wrap: wrap; }
        button {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            background: var(--accent);
            color: white;
            transition: 0.2s;
        }
        button:active { transform: scale(0.97); }
        .result-section { margin-bottom: 24px; }
        .result-label { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .result-label span:first-child { font-weight: 600; color: var(--text); }
        .result-label span:last-child { background: var(--badge-bg); padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; color: var(--text-secondary); }
        .result-box {
            background: var(--input-bg);
            border-radius: 28px;
            padding: 16px;
            border-left: 5px solid var(--accent-light);
            word-break: break-all;
            font-family: monospace;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .result-text { flex: 1; color: var(--text); }
        .copy-btn { background: var(--badge-bg); border: none; padding: 8px 16px; border-radius: 40px; font-weight: bold; cursor: pointer; color: var(--text); }
        .footer { text-align: center; padding-top: 20px; border-top: 1px solid var(--border); }
        .footer a { color: var(--text-secondary); text-decoration: none; font-weight: 600; }
        @media (max-width: 500px) {
            .card { padding: 20px 16px; }
            .result-box { flex-direction: column; align-items: flex-start; }
            .copy-btn { align-self: flex-end; }
            .theme-toggle { top: 16px; left: 16px; padding: 6px 10px; font-size: 1.1rem; }
            .header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <button class="theme-toggle" id="themeToggle">🌙</button>
        <div class="header">
            <h1 id="secretLogo">Coder AR1XY 🌿</h1>
            <p>мультишифратор от AR1XY</p>
        </div>

        <div class="cipher-select">
            <label>🔧 Выберите шифр</label>
            <select id="cipherType">
                <option value="base64">Base64</option>
                <option value="rot13">ROT13 (только латиница)</option>
                <option value="atbash">Atbash (только латиница)</option>
                <option value="caesar">Цезарь (рус/eng)</option>
                <option value="codarixy">Codarixy</option>
            </select>
            <div id="caesarControl" style="display: none;" class="caesar-slider">
                <span>Сдвиг:</span>
                <input type="range" id="shiftSlider" min="1" max="25" value="3">
                <span id="shiftValue" class="shift-value">3</span>
            </div>
        </div>

        <textarea id="inputText" rows="4" placeholder="Введите текст..."></textarea>

        <div class="buttons">
            <button id="encryptBtn">🔒 ЗАШИФРОВАТЬ</button>
            <button id="decryptBtn">🔓 РАСШИФРОВАТЬ</button>
        </div>

        <div class="result-section">
            <div class="result-label">
                <span>✨ Результат</span>
                <span id="actionBadge">—</span>
            </div>
            <div class="result-box">
                <span class="result-text" id="resultText">—</span>
                <button class="copy-btn" id="copyBtn" style="display: none;">📋 Копировать</button>
            </div>
        </div>

        <div class="footer">
            <p>📱 <a href="https://t.me/odwob" target="_blank">@odwob в Telegram</a></p>
        </div>
    </div>
</div>

<script>
    // ========== ТЕМА ==========
    const themeToggle = document.getElementById('themeToggle');
    if(localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        themeToggle.textContent = '☀️';
    }
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        themeToggle.textContent = isDark ? '☀️' : '🌙';
    });

    // ========== СЕКРЕТНЫЙ КЛЮЧ ==========
    const CODARIXY_KEY = "codarixy_secret_key";
    let secretRevealed = false;

    // ========== ПАСХАЛКА (зажать логотип 10 сек) ==========
    let timer = null;
    const secretLogo = document.getElementById('secretLogo');
    
    function showSecretKey() {
        if(!secretRevealed){
            secretRevealed = true;
            alert(`🔐 СЕКРЕТНЫЙ КЛЮЧ ДЛЯ "CODARIXY":\n\n${CODARIXY_KEY}\n\nCodarixy работает с русским, английским, эмодзи 😀👍`);
        }
    }
    
    secretLogo.addEventListener('touchstart', (e) => { 
        e.preventDefault();
        timer = setTimeout(showSecretKey, 10000);
    });
    secretLogo.addEventListener('touchend', () => { if(timer) clearTimeout(timer); });
    secretLogo.addEventListener('mousedown', () => { 
        timer = setTimeout(showSecretKey, 10000);
    });
    secretLogo.addEventListener('mouseup', () => { if(timer) clearTimeout(timer); });

    // ========== ШИФРЫ ==========
    const cipherSelect = document.getElementById('cipherType');
    const caesarCtrl = document.getElementById('caesarControl');
    const shiftSlider = document.getElementById('shiftSlider');
    const shiftSpan = document.getElementById('shiftValue');

    cipherSelect.addEventListener('change', () => {
        caesarCtrl.style.display = cipherSelect.value === 'caesar' ? 'flex' : 'none';
    });
    shiftSlider.addEventListener('input', () => shiftSpan.innerText = shiftSlider.value);

    // Base64
    function base64Enc(str) { return btoa(unescape(encodeURIComponent(str))); }
    function base64Dec(str) { return decodeURIComponent(escape(atob(str))); }

    // ROT13
    function rot13(str) {
        return str.replace(/[a-zA-Z]/g, c => {
            const base = c <= 'Z' ? 65 : 97;
            return String.fromCharCode((c.charCodeAt(0) - base + 13) % 26 + base);
        });
    }

    // Atbash
    function atbash(str) {
        return str.replace(/[a-zA-Z]/g, c => {
            const base = c <= 'Z' ? 65 : 97;
            return String.fromCharCode(base + 25 - (c.charCodeAt(0) - base));
        });
    }

    // Цезарь (рус+eng)
    const rusUpper = 'АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ';
    const rusLower = 'абвгдеёжзийклмнопрстуфхцчшщъыьэюя';
    const engUpper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const engLower = 'abcdefghijklmnopqrstuvwxyz';

    function caesarShift(str, shift) {
        return str.split('').map(ch => {
            let idx = rusUpper.indexOf(ch);
            if(idx !== -1) return rusUpper[(idx + shift) % 33];
            idx = rusLower.indexOf(ch);
            if(idx !== -1) return rusLower[(idx + shift) % 33];
            idx = engUpper.indexOf(ch);
            if(idx !== -1) return engUpper[(idx + shift) % 26];
            idx = engLower.indexOf(ch);
            if(idx !== -1) return engLower[(idx + shift) % 26];
            return ch;
        }).join('');
    }
    function caesarEnc(str, shift) { return caesarShift(str, shift); }
    function caesarDec(str, shift) { return caesarShift(str, (26 - shift) % 26); }

    // ========== CODARIXY (РАБОТАЕТ С ЭМОДЗИ, РУССКИМ, АНГЛ) ==========
    function codarixyEncrypt(plain, key) {
        const encoder = new TextEncoder();
        const plainBytes = encoder.encode(plain);
        const keyBytes = encoder.encode(key);
        
        const result = new Uint8Array(plainBytes.length);
        for (let i = 0; i < plainBytes.length; i++) {
            result[i] = plainBytes[i] ^ keyBytes[i % keyBytes.length];
        }
        
        let binary = '';
        for (let i = 0; i < result.length; i++) {
            binary += String.fromCharCode(result[i]);
        }
        return btoa(binary);
    }

    function codarixyDecrypt(encoded, key) {
        const decoder = new TextDecoder();
        const encoder = new TextEncoder();
        
        const binary = atob(encoded);
        const encryptedBytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            encryptedBytes[i] = binary.charCodeAt(i);
        }
        
        const keyBytes = encoder.encode(key);
        
        const result = new Uint8Array(encryptedBytes.length);
        for (let i = 0; i < encryptedBytes.length; i++) {
            result[i] = encryptedBytes[i] ^ keyBytes[i % keyBytes.length];
        }
        
        return decoder.decode(result);
    }

    // ========== ОБЩИЕ ФУНКЦИИ ==========
    function encrypt(text, cipher, shift) {
        switch(cipher) {
            case 'base64': return base64Enc(text);
            case 'rot13': return rot13(text);
            case 'atbash': return atbash(text);
            case 'caesar': return caesarEnc(text, shift);
            case 'codarixy': return codarixyEncrypt(text, CODARIXY_KEY);
            default: return text;
        }
    }

    function decrypt(text, cipher, shift) {
        switch(cipher) {
            case 'base64': return base64Dec(text);
            case 'rot13': return rot13(text);
            case 'atbash': return atbash(text);
            case 'caesar': return caesarDec(text, shift);
            case 'codarixy': return codarixyDecrypt(text, CODARIXY_KEY);
            default: return text;
        }
    }

    // ========== UI ==========
    const inputArea = document.getElementById('inputText');
    const resultSpan = document.getElementById('resultText');
    const copyBtn = document.getElementById('copyBtn');
    const actionBadge = document.getElementById('actionBadge');

    function setResult(text, action) {
        resultSpan.innerText = text || "—";
        actionBadge.innerText = action;
        copyBtn.style.display = (text && text !== "—") ? "inline-block" : "none";
    }

    document.getElementById('encryptBtn').onclick = () => {
        const text = inputArea.value.trim();
        if(!text) { setResult("❌ Введите текст", "ошибка"); return; }
        const cipher = cipherSelect.value;
        const shift = parseInt(shiftSlider.value);
        try {
            const res = encrypt(text, cipher, shift);
            setResult(res, `зашифровано ✅`);
        } catch(e) {
            console.error(e);
            setResult("Ошибка шифрования", "ошибка");
        }
    };

    document.getElementById('decryptBtn').onclick = () => {
        const data = inputArea.value.trim();
        if(!data) { setResult("❌ Введите строку", "ошибка"); return; }
        const cipher = cipherSelect.value;
        const shift = parseInt(shiftSlider.value);
        try {
            const res = decrypt(data, cipher, shift);
            setResult(res, `расшифровано ✅`);
        } catch(e) {
            console.error(e);
            setResult("❌ Ошибка расшифровки", "ошибка");
        }
    };

    copyBtn.onclick = () => {
        navigator.clipboard.writeText(resultSpan.innerText);
        copyBtn.innerText = "✅ Скопировано!";
        setTimeout(() => copyBtn.innerText = "📋 Копировать", 1500);
    };
</script>
</body>
</html>
